<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#050805"/>
  <!-- Inner border glow -->
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#10D98022" stroke-width="6"/>

  <!-- V shape (downward arrow = reduction) -->
  <path d="M112 148 L256 340 L400 148" stroke="#10D980" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small dot under V = zero goal -->
  <circle cx="256" cy="394" r="22" fill="#10D980"/>
</svg>
