<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VapeDown — Hors ligne</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    color: #e8eeff;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
  }
  .logo { width: 48px; height: 48px; background: #7C6AF7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; }
  .title { font-size: 22px; font-weight: 700; }
  .sub { font-size: 13px; color: #3a5a8a; text-align: center; max-width: 280px; line-height: 1.6; }
  .note { font-size: 11px; color: #1a2f4a; }
</style>
</head>
<body>
  <div class="logo">VD</div>
  <div class="title">Hors ligne</div>
  <p class="sub">Ton compteur tourne. Les bouffées peuvent être loguées et synchronisées au retour du réseau.</p>
  <p class="note">Développé par A.Kamara</p>
</body>
</html>
